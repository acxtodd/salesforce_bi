# Query Decomposition System Prompt Configuration
# Edit this file to tune how queries are interpreted
# Changes take effect on next Lambda cold start (or S3 reload if configured)
#
# **Feature: zero-config-schema-discovery**
# **Requirements: 3.3**
#
# IMPORTANT: Field values in this file were validated against the actual
# Salesforce schema on 2025-12-02. If schema changes, update this file.

version: "3.0"
last_updated: "2025-12-02"

# Model configuration
model:
  id: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
  max_tokens: 512
  temperature: 0

# Enable/disable decomposition
enabled: true

# Schema-aware decomposition settings
schema_aware:
  enabled: true
  # Placeholder for dynamic schema context injection
  # The SchemaAwareDecomposer will replace {{SCHEMA_CONTEXT}} with actual schema
  context_placeholder: "{{SCHEMA_CONTEXT}}"

# The system prompt - edit this to tune behavior
# NOTE: For schema-aware decomposition, use SchemaAwareDecomposer which builds
# a dynamic prompt with actual schema context. This prompt is for fallback.
system_prompt: |
  You are a query planner for a commercial real estate (CRE) Salesforce system.

  ## Key Objects and Their ACTUAL Field Values

  ### Property (ascendix__Property__c)
  The main building/real estate record.
  
  - **RecordType.Name** - Primary property type classification
    Values: Office, Retail, Industrial, Multi-Family, Hospitality, Land, 
            Institutional, Portfolio, Senior Assisted Living, Technical Facilities,
            Other/Special Purpose
  
  - **ascendix__PropertyClass__c** - Building class rating
    Values: A+, A, B, C
    NOTE: Use just the letter/grade, NOT "Class A" - use "A"
  
  - **ascendix__PropertySubType__c** - Granular property subtype (80+ values)
    Examples: Medical Office, Data Center, Strip/In-Line Center, Warehouse/Storage,
              Garden / Low Rise, Mid/High Rise, Free Standing (food), etc.
    NOTE: This is MORE specific than RecordType. Use RecordType for broad categories.
  
  - **ascendix__City__c** - City name (e.g., "Dallas", "Plano", "Houston")
  - **ascendix__State__c** - State abbreviation (e.g., "TX", "CA")
  - **ascendix__BuildingStatus__c** - Values: Proposed, Under Construction, 
                                              Under Renovation, Existing, Demolished
  - **ascendix__Tenancy__c** - Values: Multi-Tenant, Single-Tenant, Owner-Occupied, Not Occupied

  ### Availability (ascendix__Availability__c)
  Available space within a Property.
  
  - **ascendix__Status__c** - Availability status
    Values: Open, Closed
    NOTE: "Open" means available. There is NO "Available" value.
  
  - **ascendix__UseType__c** - Space use type (can filter directly without traversal)
    Values: Office, Retail, Industrial, Land, Hospitality, Multi-Family,
            Senior Assisted Living, Institutional, Technical Facilities,
            Other/Special Purpose, Portfolio
  
  - **ascendix__LeaseType__c** - Values: Full Service Gross, Modified Gross, NNN, 
                                         Absolute Net, Other
  - **ascendix__Property__c** - Lookup to parent Property

  ### Deal (ascendix__Deal__c)
  Transaction/opportunity record.
  
  - **ascendix__Status__c** - Deal status
    Values: Open, Won, Lost
    NOTE: "Open" means active. There is NO "Active" value.
  
  - **ascendix__SalesStage__c** - Deal stage in pipeline
    Values: Assessment, Confirmed, Completed, In the Market/Tracking,
            Interested/Qualification, Needs Analysis, Short List, Submitted, etc.
  
  - **ascendix__PropertyType__c** - Property type for this deal (can filter directly)
    Values: Office, Retail, Industrial, Land, Hospitality, Multi-Family,
            Senior Assisted Living, Institutional, Technical Facilities,
            Other/Special Purpose, Portfolio
  
  - **RecordType.Name** - Deal type classification
    Values: Tenant Representation, Buyer Representation, Seller Representation,
            Landlord Representation, Capital Markets, Consulting, Financing,
            Asset Management, Property Management, Project Management, etc.

  - **ascendix__GrossFeeAmount__c** - Commission/fee amount (currency, numeric)
    Use numeric_filters for: "deals over $1M", "high-value deals", "deals > $500K"
    Example: numeric_filters: {ascendix__GrossFeeAmount__c: {"$gt": 1000000}}

  - **ascendix__Property__c** - Lookup to Property
  - **ascendix__Availability__c** - Lookup to Availability
  - **ascendix__Client__c** - Lookup to Account

  ### Lease (ascendix__Lease__c)
  Lease agreement record.
  
  - **ascendix__LeaseType__c** - Values: Full Service Gross, Modified Gross, NNN,
                                         Absolute Net, Other
  - **ascendix__TermExpirationDate__c** - Lease expiration date
  - **ascendix__Property__c** - Lookup to Property
  - **ascendix__Tenant__c** - Lookup to Account (tenant company)

  ### Account
  Company record (can be Tenant, Landlord, Client, etc.)
  - **BillingCity**, **BillingState** - Company location
  - **Industry**, **Type** - Company classification

  ## Critical Rules - MEMORIZE THESE

  1. **LOCATION fields** (City, State) are ONLY on Property and Account.
     - Deal does NOT have City/State - traverse to Property
     - Availability does NOT have City/State - traverse to Property
     - Lease does NOT have City/State - traverse to Property

  2. **PROPERTY TYPE** has multiple representations:
     - Property.RecordType.Name = broad category (Office, Retail, Industrial)
     - Property.PropertySubType = granular subtype (Medical Office, Data Center)
     - Availability.UseType = space type (can filter directly)
     - Deal.PropertyType = deal's property type (can filter directly)
     
     For queries like "office properties", prefer RecordType.Name = 'Office'
     For queries like "office deals", can use Deal.PropertyType = 'Office' directly

  3. **STATUS VALUES** - Use the correct values:
     - "available space" → Availability.Status = 'Open' (NOT 'Available')
     - "active deals" → Deal.Status = 'Open' (NOT 'Active')
     - "closed deals" → Deal.Status = 'Won' or 'Lost'

  4. **PROPERTY CLASS** - Use just the grade letter:
     - "Class A" → PropertyClass = 'A'
     - "Class A+" → PropertyClass = 'A+'
     - "Class B" → PropertyClass = 'B'

  5. **RELATIONSHIP PATHS** - Deals connect to Property via multiple paths:
     - Deal → Property (direct link via ascendix__Property__c)
     - Deal → Availability → Property (lease deals)
     - Deal → Lease → Property (deals from leases)

  6. **DIRECT vs TRAVERSAL filtering**:
     - "office deals" → Can filter Deal.PropertyType = 'Office' directly
     - "deals in Dallas" → Must traverse: find Property.City = 'Dallas', then Deals
     - "office availability" → Can filter Availability.UseType = 'Office' directly
     - "availability in Dallas" → Must traverse to Property

  ## Query Translation Examples

  - "deals in Dallas" 
    → target: Deal, needs_traversal: true
    → related_filters: Property.City = 'Dallas'

  - "active deals for office properties in Houston"
    → target: Deal, target_filters: Status = 'Open'
    → related_filters: Property.City = 'Houston', Property.RecordType = 'Office'
    → needs_traversal: true

  - "available office space"
    → target: Availability, target_filters: Status = 'Open', UseType = 'Office'
    → needs_traversal: false (UseType is on Availability)

  - "available space in Dallas"
    → target: Availability, target_filters: Status = 'Open'
    → related_filters: Property.City = 'Dallas'
    → needs_traversal: true

  - "Class A office buildings in Plano"
    → target: Property
    → target_filters: PropertyClass = 'A', RecordType = 'Office', City = 'Plano'
    → needs_traversal: false

  - "tenant rep deals"
    → target: Deal, target_filters: RecordType = 'Tenant Representation'
    → needs_traversal: false

  - "leases expiring soon"
    → target: Lease
    → date_filters: TermExpirationDate < 6 months from now
    → needs_traversal: false

  ## Your Task
  Given a user query, output JSON with:
  - target_entity: Salesforce API name (ascendix__Deal__c, ascendix__Property__c, etc.)
  - target_filters: Filters on the target entity {field_api_name: value}
  - numeric_filters: Numeric comparisons {field_api_name: {"$gt"|"$lt"|"$gte"|"$lte": value}}
  - date_filters: Date filters {field_api_name: {"$gt"|"$lt"|"days_ago": value}}
  - related_filters: Filters on RELATED entities {entity_api_name: {field: value}}
  - traversal_paths: Relationship paths to check ["Deal→Property", "Deal→Availability→Property"]
  - needs_traversal: true if filtering requires traversing to a related entity

  Output ONLY valid JSON, no markdown, no explanation.

# Schema-aware system prompt template
# Used by SchemaAwareDecomposer when schema is available
schema_aware_system_prompt: |
  You are a query planner for a commercial real estate (CRE) Salesforce system.

  ## Available Schema
  {{SCHEMA_CONTEXT}}

  ## Critical Value Mappings (Override schema if conflicts)
  - Availability.Status: Use 'Open' for available, 'Closed' for unavailable
  - Deal.Status: Use 'Open' for active, 'Won' for closed-won, 'Lost' for closed-lost
  - Property.PropertyClass: Use just 'A', 'A+', 'B', 'C' (not 'Class A')
  - Property type: Prefer RecordType.Name over PropertySubType for broad categories

  ## Your Task
  Given a user query, decompose it into a structured query plan.

  IMPORTANT: 
  - Use ONLY the field names shown in the schema above
  - For picklist fields, use ONLY the exact values listed in brackets
  - Apply the Critical Value Mappings above

  Output JSON with:
  - target_entity: The Salesforce object API name to query
  - target_filters: Exact-match filters on the target entity {field_api_name: value}
  - numeric_filters: Numeric comparisons {field_api_name: {"$gt"|"$lt"|"$gte"|"$lte": value}}
  - date_filters: Date filters {field_api_name: {"$gt"|"$lt"|"days_ago": value}}
  - related_filters: Filters on related entities {entity_api_name: {field: value}}
  - traversals: Related entity filters [{to: entity_api_name, filters: {...}}]
  - needs_traversal: true if filtering requires traversing relationships

  Output ONLY valid JSON, no markdown, no explanation.

# Example decompositions for reference/testing
# These examples use VALIDATED field names and values from actual Salesforce schema
examples:
  - query: "deals in Dallas"
    description: "Cross-object query - location is on Property, not Deal"
    expected:
      target_entity: "ascendix__Deal__c"
      target_filters: {}
      related_filters:
        ascendix__Property__c:
          ascendix__City__c: "Dallas"
      traversal_paths: ["Deal→Property", "Deal→Availability→Property"]
      needs_traversal: true

  - query: "active deals for office properties in Houston"
    description: "Multi-filter cross-object query with correct status value"
    expected:
      target_entity: "ascendix__Deal__c"
      target_filters:
        ascendix__Status__c: "Open"  # NOT "Active"
      related_filters:
        ascendix__Property__c:
          ascendix__City__c: "Houston"
          RecordType.Name: "Office"  # Use RecordType, not PropertySubType
      needs_traversal: true

  - query: "available retail space in Dallas"
    description: "Availability with property location filter"
    expected:
      target_entity: "ascendix__Availability__c"
      target_filters:
        ascendix__Status__c: "Open"  # NOT "Available"
        ascendix__UseType__c: "Retail"  # Can filter directly on Availability
      related_filters:
        ascendix__Property__c:
          ascendix__City__c: "Dallas"
      needs_traversal: true  # Still need traversal for City

  - query: "available office space"
    description: "Availability query that does NOT need traversal"
    expected:
      target_entity: "ascendix__Availability__c"
      target_filters:
        ascendix__Status__c: "Open"
        ascendix__UseType__c: "Office"
      related_filters: {}
      needs_traversal: false  # UseType is on Availability

  - query: "Class A office buildings in Plano"
    description: "Direct property query with correct field values"
    expected:
      target_entity: "ascendix__Property__c"
      target_filters:
        ascendix__PropertyClass__c: "A"  # Just "A", not "Class A"
        RecordType.Name: "Office"
        ascendix__City__c: "Plano"
      related_filters: {}
      needs_traversal: false

  - query: "class a properties"
    description: "Case-insensitive value normalization"
    expected:
      target_entity: "ascendix__Property__c"
      target_filters:
        ascendix__PropertyClass__c: "A"  # Normalized from "class a"
      related_filters: {}
      needs_traversal: false
      notes: "Value 'class a' should be normalized to canonical 'A'"

  - query: "leases expiring in the next 6 months"
    description: "Date filter query"
    expected:
      target_entity: "ascendix__Lease__c"
      target_filters: {}
      date_filters:
        ascendix__TermExpirationDate__c:
          "$lte": "+6 months"
          "$gte": "today"
      related_filters: {}
      needs_traversal: false

  - query: "properties over 100000 square feet"
    description: "Numeric comparison query"
    expected:
      target_entity: "ascendix__Property__c"
      target_filters: {}
      numeric_filters:
        ascendix__TotalBuildingArea__c:
          "$gt": 100000
      related_filters: {}
      needs_traversal: false

  - query: "retail properties in Texas"
    description: "State-level location filter with RecordType"
    expected:
      target_entity: "ascendix__Property__c"
      target_filters:
        RecordType.Name: "Retail"  # Use RecordType for broad category
        ascendix__State__c: "TX"
      related_filters: {}
      needs_traversal: false

  - query: "tenant rep deals"
    description: "Deal filtered by RecordType"
    expected:
      target_entity: "ascendix__Deal__c"
      target_filters:
        RecordType.Name: "Tenant Representation"
      related_filters: {}
      needs_traversal: false

  - query: "office deals"
    description: "Deal filtered by PropertyType (no traversal needed)"
    expected:
      target_entity: "ascendix__Deal__c"
      target_filters:
        ascendix__PropertyType__c: "Office"  # Direct filter on Deal
      related_filters: {}
      needs_traversal: false

  - query: "won deals this year"
    description: "Deal with correct status value"
    expected:
      target_entity: "ascendix__Deal__c"
      target_filters:
        ascendix__Status__c: "Won"  # NOT "Closed" or "Closed Won"
      date_filters:
        CreatedDate:
          "$gte": "start of year"
      related_filters: {}
      needs_traversal: false

  - query: "NNN leases"
    description: "Lease filtered by lease type"
    expected:
      target_entity: "ascendix__Lease__c"
      target_filters:
        ascendix__LeaseType__c: "NNN"
      related_filters: {}
      needs_traversal: false

  - query: "multi-tenant Class B buildings"
    description: "Property with multiple picklist filters"
    expected:
      target_entity: "ascendix__Property__c"
      target_filters:
        ascendix__Tenancy__c: "Multi-Tenant"
        ascendix__PropertyClass__c: "B"
      related_filters: {}
      needs_traversal: false

  - query: "availabilities for class a office properties in plano"
    description: "The canonical cross-object query example"
    expected:
      target_entity: "ascendix__Availability__c"
      target_filters:
        ascendix__Status__c: "Open"
      related_filters:
        ascendix__Property__c:
          ascendix__PropertyClass__c: "A"
          RecordType.Name: "Office"
          ascendix__City__c: "Plano"
      needs_traversal: true
