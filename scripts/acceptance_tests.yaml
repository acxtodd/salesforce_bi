# Acceptance test cases for AscendixIQ query pipeline (Task 1.3)
#
# Each test exercises a CRE question through the full pipeline:
#   user question -> QueryHandler -> Claude (Bedrock) -> ToolDispatcher -> TurbopufferBackend
#
# Categories mirror spec S9 query patterns.

tests:
  # =========================================================================
  # Simple search (5 tests)
  # =========================================================================

  - id: "search-01"
    question: "Find Class A office properties in Dallas"
    category: "simple_search"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["Dallas", "Class A", "office"]
      min_results: 1
      no_error: true
      latency_under: 15

  - id: "search-02"
    question: "Show me properties over 100,000 square feet"
    category: "simple_search"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["100,000", "100000", "square feet", "SF"]
      answer_contains_number: true
      min_results: 1
      no_error: true
      latency_under: 15

  - id: "search-03"
    question: "What leases are expiring in the next year?"
    category: "simple_search"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["lease", "expir", "2027", "2026"]
      min_results: 1
      no_error: true
      latency_under: 15

  - id: "search-04"
    question: "Show me available office spaces"
    category: "simple_search"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["available", "office", "space"]
      min_results: 1
      no_error: true
      latency_under: 15

  - id: "search-05"
    question: "Find properties owned by the largest landlord in our database"
    category: "simple_search"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["propert", "owner", "landlord"]
      min_results: 1
      no_error: true
      latency_under: 15

  # =========================================================================
  # Cross-object / filtered search (3 tests)
  # =========================================================================

  - id: "cross-01"
    question: "Find lease comps in Dallas on office property over 10,000 SF"
    category: "cross_object"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["Dallas", "lease", "office"]
      answer_contains_number: true
      min_results: 1
      no_error: true
      latency_under: 30

  - id: "cross-02"
    question: "What spaces are available in Class A buildings?"
    category: "cross_object"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["available", "Class A", "space"]
      min_results: 1
      no_error: true
      latency_under: 30

  - id: "cross-03"
    question: "Show me leases on properties in Dallas"
    category: "cross_object"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["lease", "Dallas"]
      min_results: 1
      no_error: true
      latency_under: 30

  # =========================================================================
  # Aggregation (3 tests)
  # =========================================================================

  - id: "agg-01"
    question: "How many properties are there by city?"
    category: "aggregation"
    expected:
      tool_used: "aggregate_records"
      answer_contains_any: ["propert", "city", "cities"]
      answer_contains_number: true
      no_error: true
      latency_under: 15

  - id: "agg-02"
    question: "Give me a count of properties by class"
    category: "aggregation"
    expected:
      tool_used: "aggregate_records"
      answer_contains_any: ["propert", "class", "Class A", "Class B"]
      answer_contains_number: true
      no_error: true
      latency_under: 15

  - id: "agg-03"
    question: "How many leases are there by lease type?"
    category: "aggregation"
    expected:
      tool_used: "aggregate_records"
      answer_contains_any: ["lease", "type"]
      answer_contains_number: true
      no_error: true
      latency_under: 15

  # =========================================================================
  # Comparison (2 tests)
  # =========================================================================

  - id: "comp-01"
    question: "Compare the number of properties in Dallas versus Houston"
    category: "comparison"
    expected:
      tool_used: "aggregate_records"
      answer_contains_any: ["Dallas", "Houston"]
      answer_contains_number: true
      no_error: true
      latency_under: 30

  - id: "comp-02"
    question: "Compare availability counts by use type"
    category: "comparison"
    expected:
      tool_used: "aggregate_records"
      answer_contains_any: ["availab", "type", "office", "industrial", "retail"]
      answer_contains_number: true
      no_error: true
      latency_under: 30

  # =========================================================================
  # Cross-object expanded corpus (3 tests — Task 4.7)
  # =========================================================================

  - id: "cross-04"
    question: "find contacts at properties in Dallas"
    category: "cross_object"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["contact", "Dallas", "propert"]
      min_results: 1
      no_error: true
      latency_under: 30

  - id: "cross-05"
    question: "show deals related to ACME Corp"
    category: "cross_object"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["deal", "ACME"]
      min_results: 1
      no_error: true
      latency_under: 30

  - id: "cross-06"
    question: "what leases are expiring this quarter"
    category: "cross_object"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["lease", "expir", "quarter", "2026"]
      min_results: 1
      no_error: true
      latency_under: 30

  # =========================================================================
  # Natural language / semantic (2 tests)
  # =========================================================================

  - id: "nlp-01"
    question: "What do we have in Texas?"
    category: "semantic"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["Texas", "TX", "Dallas", "Houston", "propert"]
      min_results: 1
      no_error: true
      latency_under: 15

  - id: "nlp-02"
    question: "Tell me about the largest properties"
    category: "semantic"
    expected:
      tool_used: "search_records"
      answer_contains_any: ["large", "biggest", "propert", "square feet", "SF"]
      answer_contains_number: true
      min_results: 1
      no_error: true
      latency_under: 15
