[pytest]
# Pytest configuration for Lambda function tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = 
    chunking
    embed
    authz
    retrieve
    .

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    cdc: CDC pipeline integration tests
    property: Property-based tests using Hypothesis

# Hypothesis settings for property-based testing
# Minimum 100 iterations per property test as per design.md
[hypothesis]
default_settings = max_examples=100, deadline=None
